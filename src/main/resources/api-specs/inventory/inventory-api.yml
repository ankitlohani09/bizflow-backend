get:
  tags:
    - "Inventory"
  summary: "Get current stock levels"
  description: "Returns current stock levels for all items"
  operationId: "getInventory"
  parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
      example: 0
    - name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
      example: 20
    - name: search
      in: query
      required: false
      schema:
        type: string
      example: "salt"
    - name: lowStock
      in: query
      required: false
      schema:
        type: boolean
      example: true
  responses:
    "200":
      description: "Inventory fetched successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Success"
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    itemId:
                      type: integer
                      example: 1
                    itemName:
                      type: string
                      example: "Tata Salt"
                    sku:
                      type: string
                      example: "SKU-001"
                    currentStock:
                      type: integer
                      example: 100
                    minStockLevel:
                      type: integer
                      example: 10
                    unit:
                      type: string
                      example: "KG"
                    isLowStock:
                      type: boolean
                      example: false