get:
  tags:
    - "Inventory"
  summary: "Get stock movements"
  description: "Returns stock movement history"
  operationId: "getStockMovements"
  parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
      example: 0
    - name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
      example: 20
    - name: itemId
      in: query
      required: false
      schema:
        type: integer
      example: 1
    - name: type
      in: query
      required: false
      schema:
        type: string
        enum: [PURCHASE, SALE, RETURN, ADJUSTMENT, DAMAGE]
      example: "PURCHASE"
    - name: fromDate
      in: query
      required: false
      schema:
        type: string
        format: date
      example: "2026-01-01"
    - name: toDate
      in: query
      required: false
      schema:
        type: string
        format: date
      example: "2026-04-05"
  responses:
    "200":
      description: "Stock movements fetched successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Success"
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    itemId:
                      type: integer
                      example: 1
                    itemName:
                      type: string
                      example: "Tata Salt"
                    type:
                      type: string
                      example: "PURCHASE"
                    direction:
                      type: string
                      enum: [IN, OUT]
                      example: "IN"
                    quantity:
                      type: integer
                      example: 50
                    previousStock:
                      type: integer
                      example: 50
                    currentStock:
                      type: integer
                      example: 100
                    note:
                      type: string
                      example: "Purchase from supplier"
                    createdAt:
                      type: string
                      format: date-time
                      example: "2026-04-05T10:00:00"