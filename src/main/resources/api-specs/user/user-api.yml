get:
  tags:
    - "User"
  summary: "Get all users"
  description: "Returns all users of current tenant"
  operationId: "getAllUsers"
  parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
      example: 0
    - name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
      example: 20
  responses:
    "200":
      description: "Users fetched successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Success"
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    name:
                      type: string
                      example: "Ankit Lohani"
                    email:
                      type: string
                      example: "ankit@bizflow.com"
                    phone:
                      type: string
                      example: "9876543210"
                    role:
                      type: string
                      example: "MANAGER"
                    active:
                      type: boolean
                      example: true

post:
  tags:
    - "User"
  summary: "Create user"
  description: "Create a new user under current tenant"
  operationId: "createUser"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - email
            - phone
            - role
          properties:
            name:
              type: string
              example: "Ankit Lohani"
            email:
              type: string
              format: email
              example: "ankit@bizflow.com"
            phone:
              type: string
              example: "9876543210"
            password:
              type: string
              format: password
              example: "secret123"
            role:
              type: string
              enum: [OWNER, MANAGER, STAFF]
              example: "MANAGER"
  responses:
    "201":
      description: "User created successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "User created successfully"
              data:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: "Ankit Lohani"
                  email:
                    type: string
                    example: "ankit@bizflow.com"
    "400":
      description: "Validation error"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Email already exists"
              data:
                nullable: true
                example: null