get:
  tags:
    - "Billing"
  summary: "Get all invoices"
  description: "Returns all invoices of current tenant"
  operationId: "getAllInvoices"
  parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
      example: 0
    - name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
      example: 20
    - name: fromDate
      in: query
      required: false
      schema:
        type: string
        format: date
      example: "2026-01-01"
    - name: toDate
      in: query
      required: false
      schema:
        type: string
        format: date
      example: "2026-04-05"
    - name: status
      in: query
      required: false
      schema:
        type: string
        enum: [PAID, UNPAID, PARTIAL, CANCELLED]
      example: "PAID"
    - name: search
      in: query
      required: false
      schema:
        type: string
      example: "INV-001"
  responses:
    "200":
      description: "Invoices fetched successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Success"
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    invoiceNumber:
                      type: string
                      example: "INV-2026-001"
                    customerName:
                      type: string
                      example: "Rahul Sharma"
                    customerPhone:
                      type: string
                      example: "9876543210"
                    totalAmount:
                      type: number
                      example: 500.00
                    discountAmount:
                      type: number
                      example: 50.00
                    taxAmount:
                      type: number
                      example: 25.00
                    netAmount:
                      type: number
                      example: 475.00
                    paidAmount:
                      type: number
                      example: 475.00
                    paymentStatus:
                      type: string
                      example: "PAID"
                    paymentMode:
                      type: string
                      example: "CASH"
                    createdAt:
                      type: string
                      format: date-time
                      example: "2026-04-05T10:00:00"

post:
  tags:
    - "Billing"
  summary: "Create invoice"
  description: "Create a new invoice / bill"
  operationId: "createInvoice"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - items
            - paymentMode
          properties:
            customerName:
              type: string
              example: "Rahul Sharma"
            customerPhone:
              type: string
              example: "9876543210"
            customerId:
              type: integer
              example: 1
            discountPercent:
              type: number
              example: 10.0
            paymentMode:
              type: string
              enum: [CASH, CARD, UPI, CREDIT]
              example: "CASH"
            paidAmount:
              type: number
              example: 475.00
            note:
              type: string
              example: "Regular customer"
            items:
              type: array
              items:
                type: object
                required:
                  - itemId
                  - quantity
                  - sellingPrice
                properties:
                  itemId:
                    type: integer
                    example: 1
                  quantity:
                    type: integer
                    example: 2
                  sellingPrice:
                    type: number
                    example: 25.00
                  discountPercent:
                    type: number
                    example: 5.0
  responses:
    "201":
      description: "Invoice created successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Invoice created successfully"
              data:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  invoiceNumber:
                    type: string
                    example: "INV-2026-001"
                  netAmount:
                    type: number
                    example: 475.00
                  paymentStatus:
                    type: string
                    example: "PAID"
    "400":
      description: "Validation error"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Insufficient stock for item Tata Salt"
              data:
                nullable: true
                example: null