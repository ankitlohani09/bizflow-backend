get:
  tags:
    - "Catalogue"
  summary: "Get all items"
  description: "Returns all items of current tenant"
  operationId: "getAllItems"
  parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
      example: 0
    - name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
      example: 20
    - name: categoryId
      in: query
      required: false
      schema:
        type: integer
      example: 1
    - name: search
      in: query
      required: false
      schema:
        type: string
      example: "sugar"
  responses:
    "200":
      description: "Items fetched successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Success"
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    name:
                      type: string
                      example: "Tata Salt"
                    sku:
                      type: string
                      example: "SKU-001"
                    categoryId:
                      type: integer
                      example: 1
                    categoryName:
                      type: string
                      example: "Grocery"
                    unit:
                      type: string
                      example: "KG"
                    sellingPrice:
                      type: number
                      example: 25.00
                    costPrice:
                      type: number
                      example: 20.00
                    currentStock:
                      type: integer
                      example: 100
                    active:
                      type: boolean
                      example: true

post:
  tags:
    - "Catalogue"
  summary: "Create item"
  description: "Create a new item in catalogue"
  operationId: "createItem"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
            - categoryId
            - unit
            - sellingPrice
          properties:
            name:
              type: string
              example: "Tata Salt"
            sku:
              type: string
              example: "SKU-001"
            barcode:
              type: string
              example: "8901234567890"
            categoryId:
              type: integer
              example: 1
            unit:
              type: string
              example: "KG"
            sellingPrice:
              type: number
              example: 25.00
            costPrice:
              type: number
              example: 20.00
            taxPercent:
              type: number
              example: 5.0
            minStockLevel:
              type: integer
              example: 10
            description:
              type: string
              example: "Tata Salt 1kg pack"
  responses:
    "201":
      description: "Item created successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Item created successfully"
              data:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: "Tata Salt"
                  sku:
                    type: string
                    example: "SKU-001"
    "400":
      description: "Validation error"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Item name already exists"
              data:
                nullable: true
                example: null