get:
  tags:
    - "Catalogue"
  summary: "Get all categories"
  description: "Returns all categories of current tenant"
  operationId: "getAllCategories"
  responses:
    "200":
      description: "Categories fetched successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Success"
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    name:
                      type: string
                      example: "Grocery"
                    description:
                      type: string
                      example: "All grocery items"
                    active:
                      type: boolean
                      example: true

post:
  tags:
    - "Catalogue"
  summary: "Create category"
  description: "Create a new category"
  operationId: "createCategory"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              example: "Grocery"
            description:
              type: string
              example: "All grocery items"
  responses:
    "201":
      description: "Category created successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Category created successfully"
              data:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: "Grocery"
    "400":
      description: "Validation error"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Category already exists"
              data:
                nullable: true
                example: null