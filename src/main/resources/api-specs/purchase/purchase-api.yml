get:
  tags:
    - "Purchase"
  summary: "Get all purchases"
  description: "Returns all purchases of current tenant"
  operationId: "getAllPurchases"
  parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
      example: 0
    - name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
      example: 20
    - name: fromDate
      in: query
      required: false
      schema:
        type: string
        format: date
      example: "2026-01-01"
    - name: toDate
      in: query
      required: false
      schema:
        type: string
        format: date
      example: "2026-04-05"
    - name: supplierId
      in: query
      required: false
      schema:
        type: integer
      example: 1
  responses:
    "200":
      description: "Purchases fetched successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Success"
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    purchaseNumber:
                      type: string
                      example: "PUR-2026-001"
                    supplierId:
                      type: integer
                      example: 1
                    supplierName:
                      type: string
                      example: "Ramesh Traders"
                    totalAmount:
                      type: number
                      example: 5000.00
                    paidAmount:
                      type: number
                      example: 5000.00
                    paymentStatus:
                      type: string
                      example: "PAID"
                    createdAt:
                      type: string
                      format: date-time
                      example: "2026-04-05T10:00:00"

post:
  tags:
    - "Purchase"
  summary: "Create purchase"
  description: "Record a new purchase from supplier"
  operationId: "createPurchase"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - supplierId
            - items
          properties:
            supplierId:
              type: integer
              example: 1
            billNumber:
              type: string
              example: "BILL-001"
            billDate:
              type: string
              format: date
              example: "2026-04-05"
            paidAmount:
              type: number
              example: 5000.00
            note:
              type: string
              example: "Monthly stock purchase"
            items:
              type: array
              items:
                type: object
                required:
                  - itemId
                  - quantity
                  - costPrice
                properties:
                  itemId:
                    type: integer
                    example: 1
                  quantity:
                    type: integer
                    example: 100
                  costPrice:
                    type: number
                    example: 20.00
                  expiryDate:
                    type: string
                    format: date
                    example: "2027-01-01"
  responses:
    "201":
      description: "Purchase created successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Purchase created successfully"
              data:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  purchaseNumber:
                    type: string
                    example: "PUR-2026-001"
                  totalAmount:
                    type: number
                    example: 5000.00
    "400":
      description: "Validation error"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Supplier not found"
              data:
                nullable: true
                example: null