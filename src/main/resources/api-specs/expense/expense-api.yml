get:
  tags:
    - "Expense"
  summary: "Get all expenses"
  description: "Returns all expenses of current tenant"
  operationId: "getAllExpenses"
  parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
      example: 0
    - name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
      example: 20
    - name: fromDate
      in: query
      required: false
      schema:
        type: string
        format: date
      example: "2026-01-01"
    - name: toDate
      in: query
      required: false
      schema:
        type: string
        format: date
      example: "2026-04-05"
    - name: categoryId
      in: query
      required: false
      schema:
        type: integer
      example: 1
  responses:
    "200":
      description: "Expenses fetched successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Success"
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    title:
                      type: string
                      example: "Shop Rent"
                    amount:
                      type: number
                      example: 15000.00
                    categoryId:
                      type: integer
                      example: 1
                    categoryName:
                      type: string
                      example: "Rent"
                    paymentMode:
                      type: string
                      example: "CASH"
                    expenseDate:
                      type: string
                      format: date
                      example: "2026-04-01"
                    note:
                      type: string
                      example: "April month rent"
                    createdAt:
                      type: string
                      format: date-time
                      example: "2026-04-01T10:00:00"

post:
  tags:
    - "Expense"
  summary: "Create expense"
  description: "Record a new expense"
  operationId: "createExpense"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - title
            - amount
            - categoryId
            - paymentMode
            - expenseDate
          properties:
            title:
              type: string
              example: "Shop Rent"
            amount:
              type: number
              example: 15000.00
            categoryId:
              type: integer
              example: 1
            paymentMode:
              type: string
              enum: [CASH, CARD, UPI, BANK_TRANSFER]
              example: "CASH"
            expenseDate:
              type: string
              format: date
              example: "2026-04-01"
            note:
              type: string
              example: "April month rent"
  responses:
    "201":
      description: "Expense created successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Expense created successfully"
              data:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  title:
                    type: string
                    example: "Shop Rent"
                  amount:
                    type: number
                    example: 15000.00
    "400":
      description: "Validation error"
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Category not found"
              data:
                nullable: true
                example: null