spring:
  application:
    name: bizflow-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bizflow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: mail.thinkai.in
    port: 465
    username: ${SPRING_MAIL_USERNAME:onboarding.pos@think-ai.in}
    password: ${SPRING_MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: mail.thinkai.in
      mail.smtp.starttls.enable: false

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /api/v1

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours in ms

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.bizflow: ${LOGGING_LEVEL_BIZFLOW:DEBUG}
    org.springframework.security: ${LOGGING_LEVEL_SECURITY:DEBUG}
    org.hibernate.SQL: INFO

# App Configuration
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

# Storage Configuration
storage:
  type: azure # change to 'azure' for cloud storage

# Azure/Cloud Settings (Used if storage.type is 'azure')
AWS_CONNECTION_STRING: ${AWS_CONNECTION_STRING:}
AWS_CONTAINER_NAME: ${AWS_CONTAINER_NAME:}